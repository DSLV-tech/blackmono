<svg width="300" height="300" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Il Monolito (Massa radicale) -->
  <rect x="80" y="60" width="140" height="180" fill="black" stroke="#FFD700" stroke-width="0.5"/>
  
  <!-- La Leva (Il Logos che interseca la materia) -->
  <path d="M40 220 L260 80" stroke="#FFD700" stroke-width="4" stroke-linecap="square"/>
  
  <!-- Il Punto di Fulcro (Il Nesso) -->
  <circle cx="150" cy="150" r="4" fill="#FFD700"/>
  
  <rect x="80" y="60" width="140" height="180" fill="black"/>
</svg>
